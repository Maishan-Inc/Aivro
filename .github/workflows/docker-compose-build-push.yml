name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_REPOSITORY: maishanhub/edge-fast-image-queue
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: Dockerfile.api
          - service: worker
            dockerfile: Dockerfile.worker
          - service: admin
            dockerfile: Dockerfile.admin
          - service: web
            dockerfile: Dockerfile.web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=raw,value=${{ matrix.service }}-main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ matrix.service }}-{{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ matrix.service }}-{{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
