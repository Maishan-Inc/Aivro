<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin · Edge-Fast-Image-Queue</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <nav class="nav">
      <span class="nav-logo">Admin</span>
      <div class="nav-actions">
        <a href="/" class="btn-subtle">返回首页</a>
      </div>
    </nav>

    <main class="shell">
      <div class="admin-cards">
        <section class="card">
          <div class="admin-header">
            <h2>模型管理</h2>
            <button id="addModelBtn" class="btn-primary">新增模型</button>
          </div>
          <div id="modelsContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <div class="admin-header">
            <h2>队列控制</h2>
            <div class="queue-controls">
              <span id="queueStatus" class="badge">--</span>
              <button id="resumeBtn" class="btn-primary">恢复队列</button>
              <button id="pauseBtn" class="btn-danger">暂停队列</button>
            </div>
          </div>
        </section>

        <section class="card">
          <h2>最近任务</h2>
          <div id="jobsContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <h2>用户管理</h2>
          <div class="toolbar">
            <input id="userSearch" class="text-input" placeholder="搜索 email / 名称 / ID" />
            <button id="userSearchBtn" class="btn-subtle">搜索</button>
          </div>
          <div id="usersContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <div class="admin-header">
            <h2>封禁列表</h2>
            <button id="addBanBtn" class="btn-danger">新增封禁</button>
          </div>
          <div id="bansContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <h2>队列事件</h2>
          <div id="eventsContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <h2>配置</h2>
          <div id="settingsContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <h2>密钥</h2>
          <div id="secretsContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>

        <section class="card">
          <h2>审计日志</h2>
          <div id="auditContainer">
            <p style="color:var(--color-mute)">加载中...</p>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="footer-inner">
        <span class="footer-brand">Edge-Fast-Image-Queue</span>
        <div class="footer-links">
          <a href="/">首页</a>
        </div>
      </div>
    </footer>

    <div id="toast" class="toast"></div>

    <div id="jobModal" class="modal-backdrop">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">任务详情</span>
          <button class="modal-close" data-close>&times;</button>
        </div>
        <div class="modal-body" id="jobModalBody"></div>
        <div class="modal-actions" id="jobModalActions"></div>
      </div>
    </div>

    <div id="userModal" class="modal-backdrop">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">编辑用户</span>
          <button class="modal-close" data-close>&times;</button>
        </div>
        <div class="modal-body" id="userModalBody"></div>
        <div class="modal-actions" id="userModalActions"></div>
      </div>
    </div>

    <div id="banModal" class="modal-backdrop">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title">新增封禁</span>
          <button class="modal-close" data-close>&times;</button>
        </div>
        <div class="modal-body" id="banModalBody">
          <div class="form-grid">
            <label>类型</label>
            <select id="banType" class="text-input">
              <option value="user_id">user_id</option>
              <option value="email">email</option>
              <option value="ip">ip</option>
              <option value="device_id">device_id</option>
            </select>
            <label>值</label>
            <input id="banValue" class="text-input" placeholder="封禁目标" />
            <label>原因</label>
            <input id="banReason" class="text-input" placeholder="可选" />
          </div>
        </div>
        <div class="modal-actions">
          <button id="banSubmitBtn" class="btn-primary">确认封禁</button>
        </div>
      </div>
    </div>

    <div id="modelModal" class="modal-backdrop">
      <div class="modal-card">
        <div class="modal-header">
          <span class="modal-title" id="modelModalTitle">新增模型</span>
          <button class="modal-close" data-close>&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-grid">
            <label>模型名称</label>
            <input id="modelName" class="text-input" placeholder="gpt-image-2" />
            <label>显示名称</label>
            <input id="modelDisplayName" class="text-input" placeholder="GPT Image 2" />
            <label>API 地址</label>
            <input id="modelBaseUrl" class="text-input" placeholder="https://api.example.com/v1" />
            <label>API 密钥</label>
            <input id="modelApiKey" class="text-input" type="password" placeholder="sk-..." />
            <label>支持尺寸</label>
            <input id="modelSizes" class="text-input" placeholder="1024x1024,1024x1536,1536x1024" />
            <label>支持质量</label>
            <input id="modelQualities" class="text-input" placeholder="auto,high,medium" />
            <label>默认尺寸</label>
            <input id="modelDefaultSize" class="text-input" placeholder="1024x1024" />
            <label>默认质量</label>
            <input id="modelDefaultQuality" class="text-input" placeholder="auto" />
            <label>排序</label>
            <input id="modelSortOrder" class="text-input" type="number" value="0" />
          </div>
        </div>
        <div class="modal-actions">
          <button id="modelSaveBtn" class="btn-primary">保存</button>
        </div>
      </div>
    </div>

    <script src="/assets/admin.js" type="module"></script>
  </body>
</html>
