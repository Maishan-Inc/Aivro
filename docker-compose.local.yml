services:
  app:
    image: aivro:local
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      STORAGE_DRIVER: ${STORAGE_DRIVER:-postgres}
      DATABASE_DSN: ${DATABASE_DSN:-postgres://aivro:aivro@db:5432/aivro?sslmode=disable}
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:3982:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: aivro-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aivro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aivro}
      POSTGRES_DB: ${POSTGRES_DB:-aivro}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aivro}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ============================================================
  #  Redis 缓存容器（第二阶段预留，默认禁用）
  #  启用方法参见 docker-compose.yml 中的注释
